- Name: "npoints_block_x"
  Type: "unsigned int"
  Default Value: "16"
  Allowed Range: "1:*"
  Description: "Number of cells per quadrant in first coordinate direction."
- Name: "npoints_block_y"
  Type: "unsigned int"
  Default Value: "16"
  Allowed Range: "1:*"
  Description: "Number of cells per quadrant in second coordinate direction."
- Name: "npoints_block_z"
  Type: "unsigned int"
  Default Value: "16"
  Allowed Range: "1:*"
  Description: "Number of cells per quadrant in third coordinate direction."
- Name: "n_ghostzones"
  Type: "unsigned int"
  Default Value: "4"
  Allowed Range: "1:*"
  Description: "Number of ghost cells per quadrant in each direction."

- Name: "xmin"
  Type: "floating point"
  Default Value: "-1.0"
  Allowed Range: "*"
  Description: "For cartesian coordinates: minimum value of X coordinate."
- Name: "xmax"
  Type: "floating point"
  Default Value: "1.0"
  Allowed Range: "*"
  Description: "For cartesian coordinates: maximum value of X coordinate."
- Name: "ymin"
  Type: "floating point"
  Default Value: "-1.0"
  Allowed Range: "*"
  Description: "For cartesian coordinates: minimum value of Y coordinate."
- Name: "ymax"
  Type: "floating point"
  Default Value: "1.0"
  Allowed Range: "*"
  Description: "For cartesian coordinates: maximum value of Y coordinate."
- Name: "zmin"
  Type: "floating point"
  Default Value: "-1.0"
  Allowed Range: "*"
  Description: "For cartesian coordinates: minimum value of Z coordinate."
- Name: "zmax"
  Type: "floating point"
  Default Value: "1.0"
  Allowed Range: "*"
  Description: "For cartesian coordinates: maximum value of Z coordinate."

- Name: "periodic_x"
  Type: "bool"
  Default Value: "false"
  Allowed Range: "true, false"
  Description: "For cartesian coordinates: is the grid periodic in X direction?"
- Name: "periodic_y"
  Type: "bool"
  Default Value: "false"
  Allowed Range: "true, false"
  Description: "For cartesian coordinates: is the grid periodic in Y direction?"
- Name: "periodic_z"
  Type: "bool"
  Default Value: "false"
  Allowed Range: "true, false"
  Description: "For cartesian coordinates: is the grid periodic in Z direction?"

- Name: "reflection_symmetries"
  Type: "array of bool"
  Default Value: "false, false, false"
  Allowed Range: "true, false"
  Description: "For cartesian coordinates: does the grid have reflection symmetries?"

- Name: "inner_region_side"
  Type: "floating point"
  Default Value: "1.0"
  Allowed Range: "0:*"
  Description: "For spherical coordinates: length of inner Cartesian region's edge."
- Name: "inner_region_radius"
  Type: "floating point"
  Default Value: "2.0"
  Allowed Range: "0:*"
  Description: "For spherical coordinates: radius of interpolated Cartesian to Spherical region."
- Name: "outer_region_radius"
  Type: "floating point"
  Default Value: "10.0"
  Allowed Range: "0:*"
  Description: "For spherical coordinates: radius of outer spherical region."
- Name: "use_logarithmic_radial_zone"
  Type: "bool"
  Default Value: "false"
  Allowed Range: "true, false"
  Description: "For spherical coordinates: if true, radial coordinate is logarithmic in the outer spherical region."


- Name: "uniform_initial_refinement"
  Type: "bool"
  Default Value: "true"
  Allowed Range: "true, false"
  Description: "If true, the grid is initially set up at a uniform refinement level."
- Name: "initial_refinement_level"
  Type: "int"
  Default Value: "2"
  Allowed Range: "1:*"
  Description: "Initial (uniform) refinement level."

- Name: "regrid_every"
  Type: "unsigned int"
  Default Value: "100"
  Allowed Range: "1:*"
  Description: "Regridding frequency expressed in iterations."
- Name: "max_refinement_level"
  Type: "unsigned int"
  Default Value: "10"
  Allowed Range: "1:*"
  Description: "Maximum allowed refinement level."
- Name: "regrid_at_postinitial"
  Type: "bool"
  Default Value: "true"
  Allowed Range: "true, false"
  Description: "Perform regridding after setting initial data?"
- Name: "postinitial_regrid_depth"
  Type: "unsigned int"
  Default Value: "1"
  Allowed Range: "1:*"
  Description: "How many times to regrid after setting initial data."
- Name: "refinement_criterion"
  Type: "keyword"
  Default Value: "FLASH_second_deriv"
  Allowed Range: "FLASH_second_deriv, simple_threshold"
  Description: "Criterion to decide which quadrants to refine/coarsen."
- Name: "refinement_criterion_reduction"
  Type: "keyword"
  Default Value: "max"
  Allowed Range: "max, min"
  Description: "How to reduce the criterion over cells in a quadrant."
- Name: "refinement_criterion_CTORE"
  Type: "floating point"
  Default Value: "0.8"
  Allowed Range: "*"
  Description: "Minimum value of reduced criterion over a quadrant to refine."
- Name: "refinement_criterion_CTODE"
  Type: "floating point"
  Default Value: "0.2"
  Allowed Range: "*"
  Description: "Maximum value of reduced criterion over a quadrant to coarsen."
- Name: "refinement_criterion_var"
  Type: "keyword"
  Default Value: "dens"
  Allowed Range: "Any existing evolved or auxiliary variable."
  Description: "Variable where the criterion should be evaluated."
- Name: "refinement_criterion_var_is_aux"
  Type: "bool"
  Default Value: "false"
  Allowed Range: "true, false"
  Description: "Is the refinement_criterion_var auxiliary?"
- Name: "FLASH_criterion_eps"
  Type: "floating point"
  Default Value: "0.01"
  Allowed Range: "0+:*"
  Description: "Epsilon parameter for FLASH second derivative refinement criterion."
- Name: "prolongation_limiter_type"
  Type: "keyword"
  Default Value: "minmod"
  Allowed Range: "minmod, monotonized-central"
  Description: "Limiter to be used for prolongation on refined cells (typically minmod unless you're sure you know why not)."