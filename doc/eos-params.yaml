- Name: "eos_type"
  Type: "keyword"
  Default Value: "hybrid"
  Allowed Range: "hybrid, tabulated"
  Description: "EOS type."
- Name: "cold_eos_type"
  Type: "keyword"
  Default Value: "piecewise_polytrope"
  Allowed Range: "piecewise_polytrope, tabulated"
  Description: "For hybrid EOSs: cold EOS type."

- Name: "ye_atmosphere"
  Type: "double"
  Default Value: "0."
  Allowed Range: "0:*"
  Description: "The electron fraction value in the atmosphere."
- Name: "temp_atmosphere"
  Type: "double"
  Default Value: "0."
  Allowed Range: "0:*"
  Description: "The temperature value in the atmosphere."
- Name: "rho_atmosphere"
  Type: "double"
  Default Value: "1.e-14"
  Allowed Range: "0:*"
  Description: "The rest-mass density value in the atmosphere."
- Name: "atm_is_beta_eq"
  Type: "bool"
  Default Value: "true"
  Allowed Range: "true, false"
  Description: "If true, the atmosphere is set to be in beta-equilibrium (overwrites ye_atmosphere)."
- Name: "extend_table_high"
  Type: "bool"
  Default Value: "false"
  Allowed Range: "true, false"
  Description: "If true, out of bounds densities along maximum table value are extrapolated."

- Name: "eps_maximum"
  Type: "double"
  Default Value: "1.e+05"
  Allowed Range: "0:*"
  Description: "Maximum allowed specific internal energy."

- Name: "gamma_th"
  Type: "double"
  Default Value: "1.8"
  Allowed Range: "0:*"
  Description: "For hybrid EOSs: the value of Gamma thermal."

- Name: "piecewise_polytrope"
  Type: "dictionary"
  Default Value: "--"
  Allowed Range: "--"
  Description: "For piecewise polytropic hybrid EOSs: piecewise polytrope settings."
- Name: 'piecewise_polytrope["n_pieces"]'
  Type: "unsigned int"
  Default Value: "7"
  Allowed Range: "1:*"
  Description: "For piecewise polytropic cold EOSs: number of segments."
- Name: 'piecewise_polytrope["gammas"]'
  Type: "list of double"
  Default Value: "[ 1.58425 , 1.28733     , 0.62223     , 1.35692     , 3.005       , 2.988       , 2.851]"
  Allowed Range: "0:*"
  Description: "For piecewise polytropic cold EOSs: Gamma of each segment. Length of this list must be n_pieces, default is SLy4 parametrization by Read et al."
- Name: 'piecewise_polytrope["rhos"]'
  Type: "list of double"
  Default Value: "[ 3.951156e-11, 6.125960e-07, 4.254672e-06, 2.367449e-04, 8.114721e-04, 1.619100e-03]"
  Allowed Range: "0:*"
  Description: "For piecewise polytropic cold EOSs: rho of each segment in code units. Length of this list must be n_pieces-1 since the first is always 0, default is SLy4 parametrization by Read et al."
- Name: 'piecewise_polytrope["kappa_0"]'
  Type: "double"
  Default Value: "1.685819e+02"
  Allowed Range: "0:*"
  Description: "For piecewise polytropic cold EOSs: first polytropic constant, the rest are calculated based on junction conditions."