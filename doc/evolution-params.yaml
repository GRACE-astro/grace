- Name: "time_stepper"
  Type: "keyword"
  Default Value: "euler"
  Allowed Range: "euler, rk2, rk3"
  Description: "Time-stepping algorithm used in GRACE."
- Name: "cfl_factor"
  Type: "double"
  Default Value: "1."
  Allowed Range: "0+:1."
  Description: "CFL factor used to determine timestep."
- Name: "final_time"
  Type: "double"
  Default Value: "2."
  Allowed Range: "0+:*"
  Description: "Time at which the simulation ends."
- Name: "reset_id_after_regrid"
  Type: "bool"
  Default Value: "false"
  Allowed Range: "true, false"
  Description: "Set initial data again after postinitial regrid."
- Name: "timestep_selection_mode"
  Type: "keyword"
  Default Value: "automatic"
  Allowed Range: "automatic, manual"
  Description: "Method to determine timestep, automatic chooses the maximum stable timestep based on characteristic speeds and CFL factor, manual sets it to a constant value."
- Name: "timestep"
  Type: "double"
  Default Value: "0.1"
  Allowed Range: "0+:*"
  Description: "If timestep_selection_mode is manual, this is the constant timestep. Typically used for testing. Beware that if this is set it's the user's responsibility to ensure stability."