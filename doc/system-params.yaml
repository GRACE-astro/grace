- Name: "master_rank"
  Type: "int"
  Default Value: "0"
  Allowed Range: "0:*"
  Description: "The master rank performs output."
- Name: "console_log_level"
  Type: "keyword"
  Default Value: "info"
  Allowed Range: "trace, debug, info, warn, error, critical"
  Description: "The minimum severity level that is printed to console."
- Name: "file_log_level"
  Type: "keyword"
  Default Value: "debug"
  Allowed Range: "trace, debug, info, warn, error, critical"
  Description: "The minimum severity level that is printed to logfiles."
- Name: "flush_logs_based_on_severity"
  Type: "bool"
  Default Value: "false"
  Allowed Range: "true, false"
  Description: "If true, message above a certain severity will flush the log buffers and cause all output to be printed."
- Name: "flush_severity_level"
  Type: "keyword"
  Default Value: "error"
  Allowed Range: "trace, debug, info, warn, error, critical"
  Description: "If ``flush_logs_based_on_severity``, this is the severity level that triggers a flush."
- Name: "flush_logs_based_on_time"
  Type: "bool"
  Default Value: "false"
  Allowed Range: "true, false"
  Description: "If true, log buffers will be flushed every n seconds printing all messages in the queue."
- Name: "flush_time"
  Type: "double"
  Default Value: "10.0"
  Allowed Range: "0:*"
  Description: "If ``flush_logs_based_on_time``, this is the number of seconds between flushes."

