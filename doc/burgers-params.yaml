- Name: "which_id"
  Type: "keyword"
  Default Value: "gaussian"
  Allowed Range: "gaussian, shocktube, three_states_shocktube, oned_N_wave"
  Description: "Initial data type."

- Name: "shocktube_left_state"
  Type: "floating point"
  Default Value: "4."
  Allowed Range: "*"
  Description: "For 2 or 3 state shocktube: the left state value."
- Name: "shocktube_central_state"
  Type: "floating point"
  Default Value: "2.0"
  Allowed Range: "*"
  Description: "For 3 state shocktube: the center state value."
- Name: "shocktube_right_state"
  Type: "floating point"
  Default Value: "0."
  Allowed Range: "*"
  Description: "For 2 or 3 state shocktube: the right state value."

- Name: "shocktube_x_location"
  Type: "floating point"
  Default Value: "1."
  Allowed Range: "*"
  Description: "For 2 or 3 state shocktube: the interface location along x."
- Name: "shocktube_x_location_2"
  Type: "floating point"
  Default Value: "-1."
  Allowed Range: "*"
  Description: "For 3 state shocktube: the second interface location along x."

- Name: "gaussian_sigma"
  Type: "floating point"
  Default Value: "0.1"
  Allowed Range: "0+:*"
  Description: "Initial gaussian pulse width."
- Name: "gaussian_x_c"
  Type: "floating point"
  Default Value: "0."
  Allowed Range: "*"
  Description: "Initial gaussian pulse x center."
- Name: "gaussian_y_c"
  Type: "floating point"
  Default Value: "0."
  Allowed Range: "*"
  Description: "Initial gaussian pulse y center."
- Name: "gaussian_z_c"
  Type: "floating point"
  Default Value: "0."
  Allowed Range: "*"
  Description: "Initial gaussian pulse z center."