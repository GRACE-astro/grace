- Name: "volume_output_every"
  Type: "int"
  Default Value: "10"
  Allowed Range: "-1:*"
  Description: "Frequency of volume (codimension 0) output in iterations, -1 means never."
- Name: "plane_surface_output_every"
  Type: "int"
  Default Value: "10"
  Allowed Range: "-1:*"
  Description: "Frequency of plane surface (codimension 1) output in iterations, -1 means never."
- Name: "sphere_surface_output_every"
  Type: "int"
  Default Value: "10"
  Allowed Range: "-1:*"
  Description: "Frequency of spherical surface (codimension 1) output in iterations, -1 means never."
- Name: "scalar_output_every"
  Type: "int"
  Default Value: "10"
  Allowed Range: "-1:*"
  Description: "Frequency of scalar output in iterations, -1 means never."
- Name: "info_output_every"
  Type: "int"
  Default Value: "10"
  Allowed Range: "-1:*"
  Description: "Frequency of console output in iterations, -1 means never."

- Name: "info_output_max_reductions"
  Type: "list of keywords"
  Default Value: "[]"
  Allowed Range: "List containing any number of evolved or auxiliary variables."
  Description: "In the console output, which variables' maxima should be included."
- Name: "info_output_min_reductions"
  Type: "list of keywords"
  Default Value: "[]"
  Allowed Range: "List containing any number of evolved or auxiliary variables."
  Description: "In the console output, which variables' minima should be included."
- Name: "info_output_norm2_reductions"
  Type: "list of keywords"
  Default Value: "[]"
  Allowed Range: "List containing any number of evolved or auxiliary variables."
  Description: "In the console output, which variables' L2 norms should be included."

- Name: "log_output_base_filename"
  Type: "string"
  Default Value: "grace_log"
  Allowed Range: "Any valid filename without extension."
  Description: "The log-files will be called ``<log_output_base_filename>_<Rank>.log``."
- Name: "log_output_base_directory"
  Type: "string"
  Default Value: "./logs"
  Allowed Range: "Any valid relative or absolute path which is user writeable."
  Description: "The log-files will be placed in this directory."

- Name: "volume_output_base_filename"
  Type: "string"
  Default Value: "volume_out"
  Allowed Range: "Any valid filename without extension."
  Description: "The volume output files will be called ``<volume_output_base_filename>_<iteration>.<extension>``."
- Name: "volume_output_base_directory"
  Type: "string"
  Default Value: "./output_volume"
  Allowed Range: "Any valid relative or absolute path which is user writeable."
  Description: "The volume output files will be placed in this directory."
  
- Name: "surface_output_base_filename"
  Type: "string"
  Default Value: "surface_out"
  Allowed Range: "Any valid filename without extension."
  Description: "The surface output files will be called ``<surface_output_base_filename>_<plane/surface>_<plane/surface_name>_<iteration>.<extension>``."
- Name: "surface_output_base_directory"
  Type: "string"
  Default Value: "./output_surface"
  Allowed Range: "Any valid relative or absolute path which is user writeable."
  Description: "The surface output files will be placed in this directory."

- Name: "scalar_output_base_filename"
  Type: "string"
  Default Value: "true, false"
  Allowed Range: "Any valid filename without extension."
  Description: "The scalar output files will be called ``<scalar_output_base_filename><varname>_<reduction>.<extension>``."
- Name: "scalar_output_base_directory"
  Type: "string"
  Default Value: "./output_scalar"
  Allowed Range: "Any valid relative or absolute path which is user writeable."
  Description: "The scalar output files will be placed in this directory."

- Name: "output_use_hdf5"
  Type: "boolean"
  Default Value: "true"
  Allowed Range: "true, false"
  Description: "Whether output should be done in hdf5, else VTK."
- Name: "hdf5_compression_level"
  Type: "unsigned int"
  Default Value: "6"
  Allowed Range: "1:9"
  Description: "Compression level of hdf5 output, note that you need a compression library installed for this to do anything."
- Name: "hdf5_chunk_size"
  Type: "unsigned int"
  Default Value: "1000"
  Allowed Range: "1:*"
  Description: "Size of chunks, can significantly impact performance, only change if you're actively profiling IO on a new system."

- Name: "volume_output_cell_variables"
  Type: "list of keywords"
  Default Value: "[]"
  Allowed Range: "List containing any number of evolved or auxiliary cell-centered variables."
  Description: "Which variables to perform volume output for."
- Name: "plane_surface_output_cell_variables"
  Type: "list of keywords"
  Default Value: "[]"
  Allowed Range: "List containing any number of evolved or auxiliary cell-centered variables."
  Description: "Which variables to perform plane surface output for."
- Name: "sphere_surface_output_cell_variables"
  Type: "list of keywords"
  Default Value: "[]"
  Allowed Range: "List containing any number of evolved or auxiliary cell-centered variables."
  Description: "Which variables to perform sphere surface output for."
- Name: "scalar_output_minmax"
  Type: "list of keywords"
  Default Value: "[]"
  Allowed Range: "List containing any number of evolved or auxiliary cell-centered variables."
  Description: "Which variables to perform min/max reduction output for."
- Name: "scalar_output_norm2"
  Type: "list of keywords"
  Default Value: "[]"
  Allowed Range: "List containing any number of evolved or auxiliary cell-centered variables."
  Description: "Which variables to perform L2 norm reduction output for."
- Name: "scalar_output_integral"
  Type: "list of keywords"
  Default Value: "[]"
  Allowed Range: "List containing any number of evolved or auxiliary cell-centered variables."
  Description: "Which variables to perform integral reduction output for."

- Name: "output_extra_quantities"
  Type: "bool"
  Default Value: "false"
  Allowed Range: "true, false"
  Description: "Perform output of extra quantities (rank_id, ref_level, coords)?"

- Name: "n_output_planes"
  Type: "unsigned int"
  Default Value: "3"
  Allowed Range: "0:"
  Description: "How many planes to output, first 3 are reserved (xy,xz,yz), max is 10."

- Name: "output_plane_x_origin_[0-9]"
  Type: "double"
  Default Value: "0."
  Allowed Range: "*"
  Description: "x coordinate origin of nth plane (n from 0 to 9)."
- Name: "output_plane_y_origin_[0-9]"
  Type: "double"
  Default Value: "0."
  Allowed Range: "*"
  Description: "y coordinate origin of nth plane (n from 0 to 9)."
- Name: "output_plane_z_origin_[0-9]"
  Type: "double"
  Default Value: "0."
  Allowed Range: "*"
  Description: "z coordinate origin of nth plane (n from 0 to 9)."

- Name: "output_plane_x_normal_[0-9]"
  Type: "double"
  Default Value: "0."
  Allowed Range: "*"
  Description: "x coordinate normal of nth plane (n from 0 to 9), for plane #2 default is 1.."
- Name: "output_plane_y_normal_[0-9]"
  Type: "double"
  Default Value: "0."
  Allowed Range: "*"
  Description: "y coordinate normal of nth plane (n from 0 to 9) for plane #1 default is 1.."
- Name: "output_plane_z_normal_[0-9]"
  Type: "double"
  Default Value: "0."
  Allowed Range: "*"
  Description: "z coordinate normal of nth plane (n from 0 to 9) for plane #0 default is 1.."

- Name: "output_plane_name_[0-9]"
  Type: "string"
  Default Value: "true, false"
  Allowed Range: "Anything"
  Description: "For first three planes default is xy, xz, yz."


- Name: "n_output_spheres"
  Type: "unsigned int"
  Default Value: "3"
  Allowed Range: "0:"
  Description: "How many spheres to output, first 3 are reserved (xy,xz,yz), max is 10."

- Name: "output_sphere_x_center_[0-9]"
  Type: "double"
  Default Value: "0."
  Allowed Range: "*"
  Description: "x coordinate center of nth sphere (n from 0 to 9)."
- Name: "output_sphere_y_center_[0-9]"
  Type: "double"
  Default Value: "0."
  Allowed Range: "*"
  Description: "y coordinate center of nth sphere (n from 0 to 9)."
- Name: "output_sphere_z_center_[0-9]"
  Type: "double"
  Default Value: "0."
  Allowed Range: "*"
  Description: "z coordinate center of nth sphere (n from 0 to 9)."

- Name: "output_sphere_radius_[0-9]"
  Type: "double"
  Default Value: "1."
  Allowed Range: "*"
  Description: "Radius of nth sphere (n from 0 to 9)."

- Name: "output_sphere_name_[0-9]"
  Type: "string"
  Default Value: "true, false"
  Allowed Range: "Anything"
  Description: "true, false"

- Name: "output_sphere_tracking_[0-9]"
  Type: "keyword"
  Default Value: "none"
  Allowed Range: "none, (max_density, min_alp)"
  Description: "Tracking criterion for nth sphere (work in progress)."