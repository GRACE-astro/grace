name: Build and Deploy Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz cmake
          python3 -m pip install --upgrade pip
          pip install -r doc/requirements.txt || true

      - name: Build docs
        run: |
          cmake -Bbuild-docs -DGRACE_BUILD_DOCS=ON -DGRACE_BUILD_DOCS_ONLY=ON && cmake --build build-docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-docs/doc/  

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
  
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
