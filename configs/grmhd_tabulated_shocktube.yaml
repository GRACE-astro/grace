name: "grace"
amr: {
  npoints_block_x: 16,
  npoints_block_y: 16,
  npoints_block_z: 16,
  xmin: -0.5,
  xmax: 0.5,
  ymin: -0.1,
  ymax: 0.1,
  zmin: -0.1,
  zmax: 0.1,
  n_ghostzones: 2,
  initial_refinement_level: 2,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false
}
IO: {
  volume_output_cell_variables: ["rho","press","eps","vel[0]", "zvec[0]"],
  volume_output_base_directory: "output_volume",
  volume_output_every: -1,
  plane_surface_output_cell_variables: [],
  plane_surface_output_every: -1,
  sphere_surface_output_every: -1,
  info_output_every: 20,
  info_output_max_reductions: ["rho", "press", "eps"],
  #["eps","rho","stilde[0]", "stilde[1]","stilde[2]","dens","press"],
  info_output_min_reductions: ["rho", "press", "eps"], #["dens","gamma[0,2]","press"],
  #["eps","rho","stilde[0]", "stilde[1]","stilde[2]","dens","press"], 
  scalar_output_every: 50,
  scalar_output_minmax: ["rho","press","eps"],
  scalar_output_norm2: [],
  scalar_output_integral: [],
  output_use_hdf5: true,
  hdf5_compression_level: 6,
  hdf5_chunk_size: 8192
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.4,
  final_time: 20,
  #timestep: 0.00025,
  #timestep_selection_mode: "manual"
}
grmhd: {
  id_type: "shocktube",
  shocktube_rho_L: 5e-3,
  shocktube_rho_R: 1e-3
}

eos: {
  eos_type: "tabulated",
  tabulated_path: "/users/pierrekh/data/eos_tables/compose_tables/sly4.h5",     

  ye_atmosphere: 0,
  temp_atmosphere: 0,
  rho_atmosphere: 1.e-14,
  eps_maximum: 1.e+05,
  extend_table_high: false,
  atm_is_beta_eq: false
}

profiling: {
  do_gpu_profiling: false
}
