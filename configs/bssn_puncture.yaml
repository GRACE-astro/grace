name: "grace"
amr: {
  npoints_block_x: 128,
  npoints_block_y: 128,
  npoints_block_z: 128,
  xmin: -32.25,
  xmax:  31.75,
  ymin: -32.25,
  ymax:  31.75,
  zmin: -32.25,
  zmax:  31.75,
  n_ghostzones: 4,
  initial_refinement_level: 0,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false
}
IO: {
  volume_output_cell_variables: ["alp","gamma_tilde[2,2]","K", "phi", "beta[0]", "H", "GammaU[0]"],
  volume_output_base_directory: "output_volume",
  volume_output_every: 10,
  plane_surface_output_cell_variables: [],
  plane_surface_output_every: -1,
  sphere_surface_output_every: -1,
  info_output_every: 1, 
  info_output_max_reductions: ["alp", "K", "H"],
  info_output_min_reductions:  ["alp", "K", "H"], 
  scalar_output_every: 50,
  scalar_output_minmax: ["alp","phi","eps"],
  scalar_output_norm2: [],
  scalar_output_integral: [],
  output_use_hdf5: true, 
  hdf5_compression_level: 6,
  hdf5_chunk_size: 8192
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk3",
  cfl_factor: 0.4,
  final_time: 64.,
  timestep: 0.1,
  timestep_selection_mode: "manual"
}
grmhd: {
  id_type: "puncture",
}

eos: {
  eos_type: "hybrid",
  cold_eos_type: "piecewise_polytrope",

  ye_atmosphere: 0,
  temp_atmosphere: 0,
  rho_atmosphere: 1.e-14,
  eps_maximum: 1.e+05,
  gamma_th: 1.6666,

  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [2.],
    rhos:   [],
    kappa_0: 0.
  }
}

profiling: {
  do_gpu_profiling: false
}

checkpoints: {
  checkpoint_dir: "./checkpoints",
  max_n_checkpoints: 3,
  interval_kind: "walltime",
  iteration_interval: 1000,
  time_interval: 204,
  walltime_interval: 12, # hours
  checkpoint_at_termination: false
}

bssn: {
  epsdiss: 0.2
}