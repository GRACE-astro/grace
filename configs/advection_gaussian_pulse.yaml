name: "thunder"
amr: {
  periodic_x: true,
  npoints_block_x: 16,
  npoints_block_y: 16,
  npoints_block_z: 16,
  xmin: -1.,
  xmax: 1.,
  ymin: -1.,
  ymax: 1.,
  zmin: -1.,
  zmax: 1.,
  n_ghostzones: 2,
  initial_refinement_level: 0,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 4,
  regrid_every: 20,
  postinitial_regrid_depth: 4
}
IO: {
  volume_output_cell_variables: ["U", "err"],
  plane_surface_output_cell_variables: ["U"],
  volume_output_every: 1000,
  plane_surface_output_every: 50
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: false,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.4,
  final_time: 2.,
  reset_id_after_regrid: true
}
scalar_advection: {
  ax: 0.5,
  ay: 0.,
  az: 0.
}