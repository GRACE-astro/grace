name: "thunder"
amr: {
  npoints_block_x: 9,
  npoints_block_y: 9,
  npoints_block_z: 9,
  xmin: -1.,
  xmax: 1.,
  ymin: -1.,
  ymax: 1.,
  zmin: -2.,
  zmax: 2.,
  n_ghostzones: 2,
  initial_refinement_level: 5,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 7,
  regrid_every: 100
}
IO: {
  volume_output_cell_variables: ["U", "err"],
  volume_output_every: 500
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: false,
  flush_level: "trace"
}
evolution: {
  time_stepper: "euler"
}