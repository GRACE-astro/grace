name: "thunder"
amr: {
  periodic_x: true,
  npoints_block_x: 32,
  npoints_block_y: 32,
  npoints_block_z: 32,
  xmin: -2.,
  xmax: 2.,
  ymin: -1.,
  ymax: 1.,
  zmin: -2.,
  zmax: 2.,
  n_ghostzones: 2,
  initial_refinement_level: 2,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 6,
  regrid_every: 100,
  postinitial_regrid_depth: 4
}
IO: {
  volume_output_cell_variables: ["U", "err"],
  volume_output_every: 200
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: false,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.4,
  final_time: 10.
}
scalar_advection: {
  ax: 0.5,
  ay: 0.,
  az: 0.
}