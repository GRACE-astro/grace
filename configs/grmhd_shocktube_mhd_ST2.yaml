name: "grace"
amr: {
  npoints_block_x: 800,
  npoints_block_y: 80,
  npoints_block_z: 80,
  xmin: -0.5,
  xmax: 0.5,
  ymin: -0.05,
  ymax: 0.05,
  zmin: -0.05,
  zmax: 0.05,
  n_ghostzones: 2,
  initial_refinement_level: 1,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false
}
IO: {
  volume_output_cell_variables: ["eps","rho","press","alp", 
                              "vel[0]", "vel[1]", "vel[2]", 
                              "B[0]", "B[1]", "B[2]", "phi_glm"],
  volume_output_base_directory: "output_volume",
  volume_output_every: 10,
  plane_surface_output_cell_variables: [],
  plane_surface_output_every: -1,
  sphere_surface_output_every: -1,
  info_output_every: 10,
  info_output_max_reductions: ["eps","rho","press","alp", 
                              "vel[0]", "vel[1]", "vel[2]", 
                              "B[0]", "B[1]", "B[2]", "phi_glm"],
  #["eps","rho","stilde[0]", "stilde[1]","stilde[2]","dens","press"],
  info_output_min_reductions: ["eps","rho","press","alp", 
                              "vel[0]", "vel[1]", "vel[2]", 
                              "B[0]", "B[1]", "B[2]", "phi_glm"],,
  #["eps","rho","stilde[0]", "stilde[1]","stilde[2]","dens","press"], 
  scalar_output_every: 50,
  scalar_output_minmax: ["eps","rho","press","alp", 
                              "vel[0]", "vel[1]", "vel[2]", 
                              "B[0]", "B[1]", "B[2]", "phi_glm"],
  scalar_output_norm2: [],
  scalar_output_integral: [],
  output_use_hdf5: true, 
  hdf5_compression_level: 6,
  hdf5_chunk_size: 8192
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.4,
  final_time: 0.55,
  #timestep: 0.00025,
  #timestep_selection_mode: "manual"
}
grmhd: {
  id_type: "shocktube_mhd",
  shocktube_mhd_press_L: 0.95,
  shocktube_mhd_press_R: 1.0,
  shocktube_mhd_rho_L: 1.08,
  shocktube_mhd_rho_R: 1.,
  shocktube_mhd_vel_x_L: 0.4,
  shocktube_mhd_vel_y_L: 0.3,
  shocktube_mhd_vel_z_L: 0.2,
  shocktube_mhd_vel_x_R: -0.45,
  shocktube_mhd_vel_y_R: -0.2,
  shocktube_mhd_vel_z_R: 0.2,
  shocktube_mhd_B_x_L: 2.0,  # due to the continuity of the normal component of B
  shocktube_mhd_B_y_L: 0.3,
  shocktube_mhd_B_z_L: 0.3,    
  shocktube_mhd_B_x_R: 2.0,   # due to the continuity of the normal component of B
  shocktube_mhd_B_y_R: -0.7,
  shocktube_mhd_B_z_R: 0.5,
}

eos: {
  eos_type: "hybrid",
  cold_eos_type: "piecewise_polytrope",

  ye_atmosphere: 0,
  temp_atmosphere: 0,
  rho_atmosphere: 1.e-14,
  eps_maximum: 1.e+05,
  gamma_th: 0.0,

  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [1.666666667],
    rhos:   [],
    kappa_0: 0.
  }
}

profiling: {
  do_gpu_profiling: false
}