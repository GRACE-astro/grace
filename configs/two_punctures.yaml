name: "grace"
amr: {
  npoints_block_x: 32,
  npoints_block_y: 32,
  npoints_block_z: 32,
  xmin: -8.0,
  xmax: 8.0,
  ymin: -8.0,
  ymax: 8.0,
  zmin: 0.0,
  zmax: 8.0,

  reflection_symmetries: {
    x: false, 
    y: false,
    z: true 
  },

  n_ghostzones: 4,
  initial_refinement_level: 2,
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false,
  n_fmr_boxes: 2,
  fmr_box_0: {
    target_level_delta: 1,
    x_min: -6,
    x_max: 6,
    y_min: -6,
    y_max: 6,
    z_min: 0,
    z_max: 4
  },
  fmr_box_1: {
    target_level_delta: 2,
    x_min: -4,
    x_max: 4,
    y_min: -4,
    y_max: 4,
    z_min: 0,
    z_max: 2
  }
}

IO: {
  volume_output_cell_variables: ["rho","press","eps","vel[0]", "alp", "beta[0]"],
  volume_output_base_directory: "output_volume",
  volume_output_every: -1,

  plane_surface_output_cell_variables: ["z4c_H", "z4c_M[0]", "beta[0]", "z4c_Khat", "gamma_tilde[0,0]", "gamma_tilde[0,1]", "gamma_tilde[0,2]", "gamma_tilde[1,1]", "gamma_tilde[1,2]", "gamma_tilde[2,2]", "z4c_theta", "conf_fact", "z4c_Gamma[0]","A_tilde[0,0]","A_tilde[0,1]","alp"],
  plane_surface_output_every: 50,

  sphere_surface_output_every: -1,

  info_output_every: 2,
  info_output_min_reductions: ["alp","conf_fact"],
  info_output_norm2_reductions: ["z4c_H"],

  scalar_output_every: 2,
  scalar_output_minmax: ["conf_fact","alp"],
  scalar_output_norm2: ["z4c_H"],
  scalar_output_integral: [],

  output_use_hdf5: true,
  hdf5_compression_level: 0,
  hdf5_chunk_size: 8192,
  output_extra_quantities: true,

  output_plane_z_origin_0: 0.015
}
system: {
  console_log_level: "info",
  file_log_level: "info",
  flush_logs_based_on_severity: false,
  flush_level: "trace",
  n_device_streams: 4
}
evolution: {
  time_stepper: "rk3",
  cfl_factor: 0.1,
  final_time: 4000
}

grmhd: {
  id_type: "two_punctures",
}

z4c: {
  kappa_1: 0.02,
  kappa_2: 0.0,
  eta: 2.0,
  eps_diss: 0.1,
  chi_floor: 1e-10
}

