name: "grace"
amr: {
  npoints_block_x: 6,
  npoints_block_y: 6,
  npoints_block_z: 6,
  periodic_x: false,
  periodic_y: false,
  periodic_z: false,
  xmin: -1.,
  xmax: 1.,
  ymin: -1.,
  ymax: 1.,
  zmin: -1.,
  zmax: 1.,
  n_ghostzones: 2,
  initial_refinement_level: 2,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 0.8,
  refinement_criterion_CTODE: 0.001,
  do_regrid_test: true
}
IO: {
  volume_output_cell_variables: ["dens"],
  output_extra_quantities: true
}
system: {
  console_log_level: "verbose",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_level: "trace",
  n_device_streams: 4
}