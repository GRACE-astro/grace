name: "grace"
amr: {
  npoints_block_x: 128,
  npoints_block_y: 128,
  npoints_block_z: 128,
  xmin: -6.0,
  xmax: 6.0,
  ymin: -6.0,
  ymax: 6.0,
  zmin: -6.0,
  zmax: 6.0,
  n_ghostzones: 4,
  initial_refinement_level: 1,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 1.5,
  refinement_criterion_CTODE: 1.0,
  refinement_criterion_var: "gamma[0,0]",
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false
}
IO: {
  volume_output_cell_variables: ["alp", "gamma[0,0]", "beta[0]", "bssn_phi", "bssn_K", "bssn_H"],
  volume_output_base_directory: "output_volume",
  volume_output_every: -1,
  plane_surface_output_cell_variables: ["alp","rho","press","eps","vel[0]", "Bvec[0]","Bdiv","beta[0]", "bssn_H", "bssn_M[0]"],
  plane_surface_output_every: 10,
  sphere_surface_output_every: -1,
  do_initial_output: true,
  info_output_every: 2,
  info_output_max_reductions: ["alp", "bssn_phi","rho","press", "Bvec[1]", "bssn_K", "bssn_H", "bssn_M[0]","bssn_M[1]","bssn_M[2]"],
  info_output_min_reductions: ["alp", "bssn_phi","rho","press", "Bvec[1]", "bssn_K", "bssn_H", "bssn_M[0]","bssn_M[1]","bssn_M[2]"], 
  scalar_output_every: 50,
  scalar_output_minmax: ["bssn_H", "bssn_M[0]","bssn_M[1]","bssn_M[2]","rho","press", "Bvec[1]"],
  scalar_output_norm2: ["bssn_H", "bssn_M[0]","bssn_M[1]","bssn_M[2]","rho","press", "Bvec[1]"],
  scalar_output_integral: [],
  output_use_hdf5: true, 
  hdf5_compression_level: 6,
  hdf5_chunk_size: 128,
  output_extra_quantities: true
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: false,
  flush_level: "trace",
  n_device_streams: 4
}
evolution: {
  time_stepper: "rk3",
  cfl_factor: 0.2,
  final_time: 2000.0,
  #termination_condition: "iteration",
  #final_iteration: 15
}
grmhd: {
  id_type: "irrot_bh_iso",
  lapse_excision: 0.05,
  irrot_bh_iso: {
    "M" : 1.0
  }
  # Avec_ID: {
  #   kind: "current_loop",
  #   cutoff_var: "press",
  #   cutoff_fact: 0.02,
  #   A_phi: 100,
  #   A_n: 2.0
  # },
  # B_field_from_Avec: true
}

eos: {
  eos_type: "hybrid",
  cold_eos_type: "piecewise_polytrope",

  ye_atmosphere: 0,
  temp_atmosphere: 0,
  rho_atmosphere: 1.e-10,
  eps_maximum: 1.e+05,
  gamma_th: 1.8,

  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [2.],
    rhos:   [],
    kappa_0: 100.
  }
}

profiling: {
  do_gpu_profiling: false
}

checkpoints: {
  checkpoint_at_termination: false,
}