name: "grace"
amr: {
  npoints_block_x: 8,
  npoints_block_y: 8,
  npoints_block_z: 8,
  xmin: -0.5,
  xmax: 0.5,
  ymin: -0.5,
  ymax: 0.5,
  zmin: -0.5,
  zmax: 0.5,
  periodic_x: true,
  periodic_y: true,
  periodic_z: true,
  n_ghostzones: 2,
  initial_refinement_level: 3,
  refinement_criterion: "shear",
  refinement_criterion_CTORE: 0.01,
  refinement_criterion_CTODE: 0.005,
  max_refinement_level: 6,
  regrid_every: 100,
  regrid_at_postinitial: false,
  postinitial_regrid_depth: 3
}
IO: {
  plane_surface_output_cell_variables: ["rho","vel[0]"],
  volume_output_cell_variables: ["rho","vel[0]"],
  volume_output_base_directory: "output_volume",
  volume_output_every: -1,
  plane_surface_output_cell_variables: [],
  plane_surface_output_every: 50,
  sphere_surface_output_every: -1,
  info_output_every: 50,
  info_output_max_reductions: ["rho","press"],
  info_output_min_reductions: ["rho","press"],
  scalar_output_every: 10,
  scalar_output_minmax: ["rho","press","eps"],
  scalar_output_norm2: [],
  scalar_output_integral: [],
  output_use_hdf5: true,
  hdf5_compression_level: 6,
  hdf5_chunk_size: 8192,
  output_extra_quantities: true,
  do_initial_output: true,
  output_plane_dir_0: 2,
  output_plane_dir_1: 1,
  output_plane_dir_2: 0
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_level: "trace",
  n_device_streams: 4
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.2,
  final_time: 2,
}
grmhd: {
  id_type: "KHI"
}

eos: {
  eos_type: "hybrid",
  cold_eos_type: "piecewise_polytrope",

  ye_atmosphere: 0,
  temp_atmosphere: 0,
  rho_atmosphere: 1.e-14,
  eps_maximum: 1.e+05,
  gamma_th: 1.4,

  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [2.],
    rhos:   [],
    kappa_0: 0.
  }
}
profiling: {
  do_gpu_profiling: false
}