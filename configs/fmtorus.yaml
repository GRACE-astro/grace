name: "grace"
amr: {
  npoints_block_x: 32,
  npoints_block_y: 32,
  npoints_block_z: 32,
  xmin: -512.0,
  xmax: 512.0,
  ymin: -512.0,
  ymax: 512.0,
  zmin: -1024.0,
  zmax: 1024.0,

  n_ghostzones: 4,
  initial_refinement_level: 2,
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false,
  n_fmr_boxes: 3,
  fmr_box_0: {
    target_level_delta: 1,
    x_min: -256,
    x_max: 256,
    y_min: -256,
    y_max: 256,
    z_min: -256,
    z_max: 256
  },
  fmr_box_1: {
    target_level_delta: 2,
    x_min: -128,
    x_max: 128,
    y_min: -128,
    y_max: 128,
    z_min: -128,
    z_max: 128
  },
  fmr_box_2: {
    target_level_delta: 3,
    x_min: -64,
    x_max: 64,
    y_min: -64,
    y_max: 64,
    z_min: -64,
    z_max: 64
  }
}
IO: {
  volume_output_cell_variables: ["rho","press","eps","vel[0]", "Bvec[0]","Bdiv"],
  volume_output_base_directory: "output_volume",
  volume_output_every: -1,

  plane_surface_output_cell_variables: ["alp","rho","press","eps","vel[0]", "Bvec[0]","Bdiv","entropy","b2","c2p_err"],
  plane_surface_output_every: 100,
  sphere_surface_output_every: -1,

  do_initial_output: true,
  info_output_every: 2,
  info_output_max_reductions: ["rho", "press", "Bdiv","b2"],
  info_output_min_reductions: [], 
  info_output_norm2_reductions: ["Bdiv","c2p_err"], 

  scalar_output_every: 50,
  scalar_output_minmax: ["rho","press","eps","Bdiv"],
  scalar_output_norm2: ["Bdiv"],
  scalar_output_integral: [],

  diagnostic_output_every: 50,

  output_use_hdf5: true, 
  hdf5_compression_level: 0,
  hdf5_chunk_size: 131072,
  output_extra_quantities: true
}
system: {
  console_log_level: "info",
  file_log_level: "info",
  flush_logs_based_on_severity: false,
  flush_level: "trace",
  n_device_streams: 4
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.2,
  final_time: 2000.0
}
grmhd: {
  id_type: "fmtorus",
  lapse_excision: 0.8,
  Avec_ID: {
    kind: "current_loop",
    cutoff_var: "rho",
    cutoff_fact: 0.2,
    A_phi: 1.0,
    A_n: 1.0
  },
  fmtorus: {
    a_BH: 0.9375,
    rho_min: 1.0e-5,
    lapse_min: 0.8,
    press_min: 0.333e-7,
    r_in: 6,
    r_at_max_density: 12,
    gamma: 1.33333333333,
    max_inverse_beta: 100,
    perturbation_amplitude: 0.02,
    rho_power: -1.5,
    press_power: -2.5,
    rho_max: 1.0
  },
  B_field_from_Avec: true,
  excision: {
    excision_criterion: "radius",
    excision_radius: 1.0,
    rho_excision: 1e-8,
    temp_excision: 0.3333e-2,
    excision_lapse: 0.2
  },
  atmosphere: {
    ye_fl: 0,
    temp_fl:  0.3333e-2,
    rho_fl: 1.e-5,
    rho_scaling: -1.5,
    temp_scaling: -1
  }
}

eos: {
  eos_type: "hybrid",
  cold_eos_type: "piecewise_polytrope",

  eps_maximum: 1.e+05,
  gamma_th: 1.33333333333,

  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [2.],
    rhos:   [],
    kappa_0: 0.
  }
}

coordinate_system: {
  is_kerr_schild: true,
  bh_spin: 0.9375
}

spherical_surfaces: {
  n_surfaces: 1,

  spherical_surface_0: {
    name: "bh_horizon",
    tracking: "none",
    radius: 1.12109,
    x_c: 0.0,
    y_c: 0.0,
    z_c: 0.0,
    
    sampling_policy: "uniform",
    resolution: 32
  }
}

bh_diagnostics: {
  detector_names: ["bh_horizon"]
}

profiling: {
  do_gpu_profiling: false
}

checkpoints: {
  checkpoint_at_termination: false,
  checkpoint_dir: "./checkpoints"
}