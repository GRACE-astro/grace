name: "grace"
amr: {
  npoints_block_x: 16,
  npoints_block_y: 16,
  npoints_block_z: 16,
  xmin: -1.5,
  xmax: 1.5,
  ymin: -0.15,
  ymax: 0.15,
  zmin: -0.15,
  zmax: 0.15,
  n_ghostzones: 2,
  initial_refinement_level: 1,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false,
}
IO: {
  volume_output_cell_variables: ["rho","press","eps","vel[0]"],
  volume_output_base_directory: "output_volume",
  volume_output_every: 10,
  plane_surface_output_cell_variables: [],
  plane_surface_output_every: -1,
  sphere_surface_output_every: -1,
  info_output_every: 10,
  info_output_max_reductions: ["rho", "press", "eps"],
  #["eps","rho","stilde[0]", "stilde[1]","stilde[2]","dens","press"],
  info_output_min_reductions: ["rho", "press", "eps"], #["dens","gamma[0,2]","press"],
  #["eps","rho","stilde[0]", "stilde[1]","stilde[2]","dens","press"], 
  scalar_output_every: 10,
  scalar_output_minmax: ["rho","press","eps"],
  scalar_output_norm2: ["rho","press","eps","vel[0]", "zvec[0]"],
  scalar_output_integral: ["rho","press","eps","vel[0]", "zvec[0]"],
  output_use_hdf5: true, 
  hdf5_compression_level: 6,
  hdf5_chunk_size: 8192
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.2,
  final_time: 1.0
}
grmhd: { 
id_type: "shocktube",
shocktube_rho_L: 1.0,
shocktube_rho_R: 0.1, # density in the paper is wrong 
shocktube_press_L: 1000,
shocktube_press_R: 1.0,
}
eos: {
  eos_type: "hybrid",
  cold_eos_type: "piecewise_polytrope",

  ye_atmosphere: 0,
  temp_atmosphere: 0,
  rho_atmosphere: 1.e-14,
  eps_maximum: 1.e+05,
  gamma_th: 1.33333,

  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [0.],
    rhos:   [],
    kappa_0: 0.
  }
}

profiling: {
  do_gpu_profiling: false
}
