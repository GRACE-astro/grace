name: "grace"
amr: {
  npoints_block_x: 48,
  npoints_block_y: 48,
  npoints_block_z: 48,
  xmin: 0.0,
  xmax: 128.0,
  ymin: 0.0,
  ymax: 128.0,
  zmin: 0.0,
  zmax: 128.0,

  reflection_symmetries: {
    x: true,
    y: true,
    z: true
  }, 

  n_ghostzones: 4,
  initial_refinement_level: 1,

  max_refinement_level: 7,

  regrid_every: -1,
  
  n_fmr_boxes: 3,
  fmr_boxes: [
    {
      target_level_delta: 1,
      x_min: 0,
      x_max: 64,
      y_min: 0,
      y_max: 64,
      z_min: 0,
      z_max: 64
    },
    {
      target_level_delta: 2,
      x_min: 0,
      x_max: 32,
      y_min: 0,
      y_max: 32,
      z_min: 0,
      z_max: 32
    },
    {
      target_level_delta: 3,
      x_min: 0,
      x_max: 16,
      y_min: 0,
      y_max: 16,
      z_min: 0,
      z_max: 16
    }
  ]
}

IO: {

  plane_surface_output_cell_variables: ["rho","zvec[0]"],
  plane_surface_output_every: 100,


  info_output_every: 2,
  info_output_max_reductions: ["rho"],

  scalar_output_every: 10,
  scalar_output_minmax: ["rho","press","eps","alp"],

  output_use_hdf5: true,
  hdf5_compression_level: 0,
  hdf5_chunk_size: 8192,
  output_extra_quantities: true,
  xy_plane_offset: 1e-5

}
system: {
  console_log_level: "info",
  file_log_level: "info",
  n_device_streams: 4
}
evolution: {
  time_stepper: "rk3",
  cfl_factor: 0.2,
  final_walltime: 23,
  termination_condition: "walltime"
}

grmhd: {
  id_type: "tov",

  tov: {
    rho_c: 1.28e-3,
    press_floor: 1e-15,
    dr: 1e-3
  },

  atmosphere: {
    temp_fl:  1e-10,
    rho_fl: 1.e-10
  },

  c2p: {
    tolerance: 1e-10,
    max_lorentz: 50,
    use_c2p_entropy_backup: false
  },

}

eos: {
  eos_type: "hybrid",

  hybrid_eos: {
    cold_eos_type: "piecewise_polytrope",
    gamma_th: 2.0
  },
  
  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [2.],
    rhos:   [],
    kappa_0: 100.
  },

  eps_maximum: 1.e+05,
}