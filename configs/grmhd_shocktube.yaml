name: "grace"
amr: {
  npoints_block_x: 16,
  npoints_block_y: 16,
  npoints_block_z: 16,
  xmin: -0.5,
  xmax: 0.5,
  ymin: -0.1,
  ymax: 0.1,
  zmin: -0.1,
  zmax: 0.1,
  n_ghostzones: 2,
  initial_refinement_level: 2,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false
}
IO: {
  volume_output_cell_variables: ["rho","press","eps","vel[0]", "zvec[0]"],
  volume_output_base_directory: "output_volume",
  volume_output_every: -1,
  plane_surface_output_cell_variables: [],
  plane_surface_output_every: -1,
  sphere_surface_output_every: -1,
  info_output_every: 20,
  info_output_max_reductions: ["rho", "press", "eps"],
  #["eps","rho","stilde[0]", "stilde[1]","stilde[2]","dens","press"],
  info_output_min_reductions: ["rho", "press", "eps"], #["dens","gamma[0,2]","press"],
  #["eps","rho","stilde[0]", "stilde[1]","stilde[2]","dens","press"], 
  scalar_output_every: 50,
  scalar_output_minmax: ["rho","press","eps"],
  scalar_output_norm2: [],
  scalar_output_integral: [],
  output_use_hdf5: true, 
  hdf5_compression_level: 6,
  hdf5_chunk_size: 8192
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.4,
  final_time: 2.,
  #timestep: 0.00025,
  #timestep_selection_mode: "manual"
}
grmhd: {
  id_type: "shocktube"
}

eos: {
  eos_type: "hybrid",
  cold_eos_type: "piecewise_polytrope",

  ye_atmosphere: 0,
  temp_atmosphere: 0,
  rho_atmosphere: 1.e-14,
  eps_maximum: 1.e+05,
  gamma_th: 1.6666,

  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [2.],
    rhos:   [],
    kappa_0: 0.
  }
}

profiling: {
  do_gpu_profiling: false
}
# ML Inference Configuration for Physics-Guided C2P Model
ml_inference: {
  # Enable AI-accelerated C2P conversion
  enable_ml: true,
  
  # Path to your physics-guided neural network model
  # Architecture: 3 inputs (D, q, r) -> 24 hidden nodes -> 1 output (correction)
  #c2p_model_path: "/zhome/academic/HLRS/xfp/xfpmiler/codes/grace-ai/physics_guided_c2p_model.h5",
  c2p_model_path: "/lustre/hpe/ws13/ws13.a/ws/xfpmiler-grace/grace-ai/pinn_c2p_vloss6.73e-07_20251021_164351.h5",
  # Validation settings - recommended for physics-guided models
  c2p_validation_enabled: true,
  
  # Error tolerance for AI predictions
  # Physics-guided models typically have better accuracy, so can use tighter tolerance
  c2p_fallback_tolerance: 1e-3,
  
  # Memory management for the 3x24x1 network (~100 parameters)
  # Small network requires minimal memory
  device_memory_pool_size: 67108864,  # 64MB should be plenty
  
  # Concurrency settings
  max_concurrent_inferences: 2048,  # Can handle more concurrent calls with small network
  
  # Debugging and monitoring
  log_inference_stats: true,   # Enable to monitor AI performance
  log_fallback_events: true,   # Log when traditional C2P is used
  performance_monitoring: true # Monitor timing for the small network
}
