# Parameter file for a generic Alfven test
# https://arxiv.org/pdf/gr-qc/0507102 (Giacomazzo & Rezzolla 2006)
# Table 4: Generic Alfven Test

name: "grace"
amr: {
  # npoints_block_x: 16,
  # npoints_block_y: 16,
  # npoints_block_z: 16,
    npoints_block_x: 16,
  npoints_block_y: 16,
  npoints_block_z: 16,
  xmin: -6.283185307,
  xmax:  6.283185307,
  ymin: -6.283185307,
  ymax:  6.283185307,
  zmin: -0.6283185307,
  zmax:  0.6283185307,
  n_ghostzones: 2,
  initial_refinement_level: 2,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false,
  periodic_x: true,
  periodic_y: true,
  periodic_z: true,
}
IO: {
  # Bug/Feature: 
  # vel[1]/vel[2] to be specifiable in the future  
  volume_output_cell_variables: ["eps","rho","press","alp", "vel[0]",
                              "B[0]", "phi_glm"],
  volume_output_base_directory: "output_volume",
  volume_output_every: 10,
  plane_surface_output_cell_variables: [],
  plane_surface_output_every: -1,
  sphere_surface_output_every: -1,
  info_output_every: 10,
  info_output_max_reductions: ["rho", "vel[0]", "B[0]", "B[1]", "B[2]", "phi_glm"],
  info_output_min_reductions: ["rho", "vel[0]", "B[0]", "B[1]", "B[2]", "phi_glm"],
  scalar_output_every: 10,
  scalar_output_minmax: ["eps","rho","press",
                         "vel[0]", "vel[1]", "vel[2]", 
                         "B[0]", "B[1]", "B[2]",
                         "phi_glm"],
  scalar_output_norm2: [],
  scalar_output_integral: [],
  output_use_hdf5: true, 
  hdf5_compression_level: 6,
  hdf5_chunk_size: 8192
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.4,
  final_time: 10.0,
  #imestep: 0.00025,
  #timestep_selection_mode: "manual"
}
grmhd: {
  id_type: "orszag_tang_vortex",
  # below, the velocities are given in units of c
  # the magnetohydrodynamical pressures (P and B^2 /2) 
  # are in the same units (the Gamma-EOS determines P)
  orszag_tang_vortex_rho: 1.0,
  orszag_tang_vortex_press: 10.0,
}

eos: {
  eos_type: "hybrid",
  cold_eos_type: "piecewise_polytrope",
  ye_atmosphere: 0,
  temp_atmosphere: 0,
  rho_atmosphere: 1.e-14,
  eps_maximum: 1.e+05,
  gamma_th: 1.33333,

  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [0.],
    rhos:   [],
    kappa_0: 0.0
  }
}

profiling: {
  do_gpu_profiling: false
}
