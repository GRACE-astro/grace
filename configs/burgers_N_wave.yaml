name: "thunder"
amr: {
  npoints_block_x: 16,
  npoints_block_y: 16,
  npoints_block_z: 16,
  xmin: -6.,
  xmax: 6.,
  ymin: -0.5,
  ymax: 0.5,
  zmin: -0.5,
  zmax: 0.5,
  n_ghostzones: 2,
  initial_refinement_level: 2,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false
}
IO: {
  volume_output_cell_variables: [],
  volume_output_every: 1000,
  plane_surface_output_cell_variables: [],
  plane_surface_output_every: 800,
  sphere_surface_output_every: -1,
  info_output_every: 10,
  info_output_max_reductions: ["U"],
  info_output_min_reductions: ["U"], 
  scalar_output_every: 10,
  scalar_output_minmax: ["U"],
  scalar_output_norm2: ["U"],
  scalar_output_integral: ["U"]
}
system: {
  console_log_level: "info",
  file_log_level: "trace",
  flush_logs_based_on_severity: false,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.4,
  final_time: 3.
}
burgers_equation: {
  id_type: "oned_N_wave"
}