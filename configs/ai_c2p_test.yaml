name: "grace"
amr: {
  npoints_block_x: 100,
  npoints_block_y: 100,
  npoints_block_z: 100,
  xmin: -1,
  xmax: 1,
  ymin: -1,
  ymax: 1,
  zmin: -1,
  zmax: 1,
  n_ghostzones: 1,
  initial_refinement_level: 0
}

IO: {
  log_output_base_directory: "logs",
  log_output_base_filename: "grace",
  volume_output_base_directory: "output_volume",
  volume_output_every: -1,  # Disable in test
  plane_surface_output_every: -1,
  sphere_surface_output_every: -1,
  info_output_every: -1,
  scalar_output_every: -1,
  output_use_hdf5: true
}

system: {
