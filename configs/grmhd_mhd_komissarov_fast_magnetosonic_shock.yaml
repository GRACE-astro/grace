# Parameter file for a fast magnetosonic shock
# https://academic.oup.com/mnras/article/303/2/343/1067242
# Table I: Fast shock 
name: "grace"
amr: {
  npoints_block_x: 16,
  npoints_block_y: 16,
  npoints_block_z: 16,
  xmin: -10.0,
  xmax: 10.0,
  ymin: -1.0,
  ymax: 1.0,
  zmin: -1.0,
  zmax: 1.0,
  n_ghostzones: 2,
  initial_refinement_level: 0,
  refinement_criterion: "simple_threshold",
  refinement_criterion_CTORE: 2.,
  refinement_criterion_CTODE: 1.,
  refinement_criterion_var: "U",
  max_refinement_level: 7,
  regrid_every: -1,
  regrid_at_postinitial: false
}
IO: {
  # Bug/Feature: 
  # vel[1]/vel[2] to be specifiable in the future  
  volume_output_cell_variables: ["eps","rho","press","alp", "vel[0]",
                              "B[0]", "phi_glm"],
  volume_output_base_directory: "output_volume",
  volume_output_every: 10,
  plane_surface_output_cell_variables: [],
  plane_surface_output_every: -1,
  sphere_surface_output_every: -1,
  info_output_every: 10,
  # info_output_max_reductions: ["eps","rho","press","alp", 
  #                             "vel[0]", "vel[1]", "vel[2]", 
  #                             "B[0]", "B[1]", "B[2]", "phi_glm"],
  info_output_max_reductions: ["eps", "B[2]", "phi_glm"],
  #["eps","rho","stilde[0]", "stilde[1]","stilde[2]","dens","press"],
  info_output_min_reductions: ["eps","rho","press","alp", 
                              "vel[0]", "vel[1]", "vel[2]", 
                              "B[0]", "B[1]", "B[2]", "phi_glm"],
  #["eps","rho","stilde[0]", "stilde[1]","stilde[2]","dens","press"], 
  scalar_output_every: 10,
  scalar_output_minmax: ["eps","rho","press","alp", 
                              "vel[0]", "vel[1]", "vel[2]", 
                              "B[0]", "B[1]", "B[2]", "phi_glm"],
  scalar_output_norm2: [],
  scalar_output_integral: [],
  output_use_hdf5: true, 
  hdf5_compression_level: 6,
  hdf5_chunk_size: 8192
}
system: {
  console_log_level: "debug",
  file_log_level: "trace",
  flush_logs_based_on_severity: true,
  flush_level: "trace"
}
evolution: {
  time_stepper: "rk2",
  cfl_factor: 0.2,
  final_time: 50.0,
  #imestep: 0.00025,
  #timestep_selection_mode: "manual"
}
grmhd: {
  id_type: "shocktube_mhd",
  # below, the velocities are given in units of c
  # the magnetohydrodynamical pressures (P and B^2 /2) 
  # are in the same units (the Gamma-EOS determines P)
  shocktube_mhd_press_L: 1.0,
  shocktube_mhd_press_R: 367.5,
  shocktube_mhd_rho_L: 1.0,
  shocktube_mhd_rho_R: 25.48,
  shocktube_mhd_vel_x_L: 1.0, # (u_L)^i = (W_L U_L)^i (25,0,0) with W=25
  shocktube_mhd_vel_y_L: 0.,
  shocktube_mhd_vel_z_L: 0.,
  shocktube_mhd_vel_x_R: 0.826152145, # (u_R)^i = (W_R U_R)^i = (1.091,0.3923,0) with W=1.32058
  shocktube_mhd_vel_y_R: 0.297066441,
  shocktube_mhd_vel_z_R: 0.0,
  shocktube_mhd_B_x_L: 20.0,  # due to the continuity of the normal component of B
  shocktube_mhd_B_y_L: 25.02,
  shocktube_mhd_B_z_L: 0.0,    
  shocktube_mhd_B_x_R: 20.0,  # due to the continuity of the normal component of B
  shocktube_mhd_B_y_R: 49.0,
  shocktube_mhd_B_z_R: 0.0,
}

eos: {
  eos_type: "hybrid",
  cold_eos_type: "piecewise_polytrope",
  ye_atmosphere: 0,
  temp_atmosphere: 0,
  rho_atmosphere: 1.e-14,
  eps_maximum: 1.e+05,
  gamma_th: 1.33333,

  piecewise_polytrope: {
    n_pieces: 1,
    gammas: [0.],
    rhos:   [],
    kappa_0: 0.0
  }
}

profiling: {
  do_gpu_profiling: false
}