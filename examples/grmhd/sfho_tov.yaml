name: "grace"
amr: {
  npoints_block_x: 48,
  npoints_block_y: 48,
  npoints_block_z: 48,
  xmin: -64.0,
  xmax: 64.0,
  ymin: -64.0,
  ymax: 64.0,
  zmin: -64.0,
  zmax: 64.0,

  n_ghostzones: 4,
  initial_refinement_level: 1,

  max_refinement_level: 7,

  regrid_every: -1,
  
  n_fmr_boxes: 2,
  fmr_boxes: [
    {
      target_level_delta: 1,
      x_min: -32,
      x_max: 32,
      y_min: -32,
      y_max: 32,
      z_min: -32,
      z_max: 32
    },
    {
      target_level_delta: 2,
      x_min: -16,
      x_max: 16,
      y_min: -16,
      y_max: 16,
      z_min: -16,
      z_max: 16
    }
  ]
}

IO: {
  plane_surface_output_cell_variables: ["metric", "hydro"],
  plane_surface_output_every: 500,

  sphere_surface_output_every: -1,

  info_output_every: 2,
  info_output_max_reductions: ["rho"],
  info_output_min_reductions: ["alp", "ye"],
  info_output_norm2_reductions: ["z4c_H"],

  scalar_output_every: 10,
  scalar_output_minmax: ["rho","press","eps","alp"],
  scalar_output_norm2: ["z4c_H"],
  scalar_output_integral: ["dens"],

  output_use_hdf5: true,
  hdf5_compression_level: 0,
  hdf5_chunk_size: 8192,
  output_extra_quantities: true,

  xy_plane_offset: 1e-5,
  xz_plane_offset: 1e-5,
  yz_plane_offset: 1e-5

}

system: {
  console_log_level: "info",
  file_log_level: "info",
  n_device_streams: 4
}

evolution: {
  time_stepper: "rk4",
  cfl_factor: 0.4,
  final_walltime: 23.6,
  final_iteration: 200,
  termination_condition: "iteration"
}

grmhd: {
  id_type: "tov",

  tov: {
    rho_c: 1.2420677174922667e-03,
    press_floor: 1e-15,
    dr: 1e-3
  },

  atmosphere: {
    temp_fl:  1e-10,
    rho_fl: 1.e-14
  },

  c2p: {
    tolerance: 1e-10,
    max_lorentz: 50,
    use_c2p_entropy_backup: false
  },

  B_field_initialization: "from_Avec", 

  Avec_ID: {
    cutoff_var: "press",
    cutoff_fact: 0.04,
    A_n: 2,
    Bmax_target: 1.197285252143398e-05, # 1e15 G 
    is_binary: false,
    radius_1: 8
  }
}

z4c: {
  eps_diss: 0.1,
  eta: 1.4
}

eos: {
  eos_type: "tabulated",

  tabulated_eos: {
    table_filename: "/u/cmusolino/eos/stellarcollapse/sfho/Hempel_SFHoEOS_rho222_temp180_ye60_version_1.1_20120817.h5",
    table_format: "stellarcollapse",
    cold_table_filename: "/u/cmusolino/eos/stellarcollapse/sfho/sfho.grace"
  },
  
  eps_maximum: 1.e+05
}

co_tracker: {
  n_cos: 1,
  update_every: 2,

  cos: [
    {
      kind: "ns",
      name: "ns_1",
      x_i: 0,
      y_i: 0,
      z_i: 0,
      radius: 10
    }
  ]
}

checkpoints: {
  checkpoint_at_startup: true
}