# 64 cells / block 
# 4 trees along y -> 256 cells 
# 8 along x       -> 512 cells 
name: "grace"
amr: {
  npoints_block_x: 32,
  npoints_block_y: 32,
  npoints_block_z: 32,

  xmin: -0.5,
  xmax: 0.5,

  ymin: 0.0,
  ymax: 0.25,

  zmin: -0.125,
  zmax: 0.125,

  periodic_x: true,
  periodic_z: true,

  reflection_symmetries: {
        y: true
  },

  n_ghostzones: 4,
  initial_refinement_level: 1,

  max_refinement_level: 7,
  regrid_every: -1,

  regrid_at_postinitial: false
}

IO: {

  plane_surface_output_cell_variables: ["hydro"],
  plane_surface_output_every: 100,

  info_output_every: 20,
  info_output_max_reductions: ["press","Bdiv"],

  scalar_output_every: 50,
  scalar_output_minmax: ["rho","press","eps","Bdiv"],
  scalar_output_norm2: ["Bdiv"],

  output_use_hdf5: true,
  hdf5_compression_level: 0,
  hdf5_chunk_size: 8192,

  output_extra_quantities: true,

  xy_plane_offset: 1e-5
}

evolution: {
  time_stepper: "rk4",
  cfl_factor: 0.8,
  final_time: 110 # approx 60 Alfvén times 
}

grmhd: {
  id_type: "current_sheet"
}

system: {
  console_log_level: "info",
  file_log_level: "verbose",
  n_device_streams: 4
}

eos: {
  eos_type: "ideal_gas",

  ideal_gas_eos: {
    gamma: 1.6666667
  }
}

